<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สุ่มจากรูปภาพ - PickPop</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Anuphan:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/image-mode.css">
</head>
<body>
    <div class="image-mode-page">
        <!-- Top Bar - เหลือแค่สิ่งจำเป็น -->
        <div class="top-bar">
            <div class="top-bar-left">
                <a href="index.html" class="back-btn">
                    <span>←</span>
                    <span>หน้าแรก</span>
                </a>
                <div class="counter-display" id="counterDisplay">0/0</div>
            </div>

            <div class="top-bar-right">
                <!-- Settings button will be inserted by settings.js -->
            </div>
        </div>

        <!-- Hidden inputs for backward compatibility -->
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple style="display:none;">
        <input type="file" id="addMoreInput" accept="image/jpeg,image/png,image/webp" multiple style="display:none;">
        <input type="file" id="importInput" accept=".json" style="display:none;">

        <!-- Grid Container -->
        <div class="grid-container" id="gridContainer">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">📸</div>
                <h2 class="empty-state-title">ยังไม่มีรูปภาพ</h2>
                <p class="empty-state-text">
                    เริ่มต้นด้วยการเปิด <strong>ตั้งค่า ⚙️</strong> ที่มุมขวาบน<br>
                    แล้วเลือก "เลือกรูปภาพ"
                </p>
                <button class="setting-btn setting-btn-accent" id="openSettingsFromEmpty" style="max-width: 200px; margin-top: 10px;">
                    ⚙️ เปิดตั้งค่า
                </button>
            </div>
            <div class="highlight-box" id="highlightBox"></div>
        </div>

        <!-- Winner Gallery -->
        <div class="winner-gallery" id="winnerGallery"></div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn-control btn-reset" id="resetBtn" disabled>
                🔄 Reset
            </button>
            <button class="btn-control btn-shuffle" id="shuffleBtn" disabled>
                🔀 Shuffle
            </button>
            <button class="btn-control btn-draw" id="drawBtn" disabled>
                🎲 Random
            </button>
        </div>

        <!-- Free Tier Warning -->
        <div class="free-tier-warning" id="freeTierWarning">
            <div class="free-tier-warning-icon">⚠️</div>
            <div class="free-tier-warning-text">
                <strong>เกินขีดจำกัดฟรี!</strong><br>
                รุ่นฟรีสุ่มได้สูงสุด 30 คน — <a href="index.html" style="color: white; text-decoration: underline;">อัปเกรดที่นี่</a>
            </div>
        </div>

        <!-- Winner Modal -->
        <div class="modal-overlay" id="winnerModal">
            <div class="modal-content">
                <button class="close-modal" id="closeModal">✕</button>
                <h1 class="modal-title">
                    <span class="modal-title-emoji">🎉</span>
                    ผู้โชคดี!
                </h1>
                <div class="winner-images-grid" id="winnerContent"></div>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/image-mode.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const openBtn = document.getElementById('openSettingsFromEmpty');
            if (openBtn) {
                openBtn.addEventListener('click', () => {
                    if (window.settingsPanel) {
                        window.settingsPanel.openPanel();
                    }
                });
            }
        });
    </script>
</body>
</html>
